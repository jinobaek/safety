      <div><span class="shift-label">³√</span></div>

      <div><span class="shift-label">π</span></div>
      <div><span class="shift-label">e</span></div>

    <!-- 기능 키 2세트 -->
    <div class="grid grid-cols-5 gap-1.5 sm:gap-2 mb-2">

      <button onclick="appendNumber('4')" class="casio-btn-white py-2.5 sm:py-3.5 rounded-lg text-lg sm:text-xl font-bold transition-all">4</button>

      <button onclick="appendNumber('0')" class="casio-btn-white py-2.5 sm:py-3.5 rounded-lg text-lg sm:text-xl font-bold transition-all">0</button>

    <div class="text-center mt-3 sm:mt-4">

    </div>

  </div>

  <script>
    // 카시오 상태 저장소
    let currentInput = "";      // 현재 입력 수식 문자열
    let resultValue = "0";      // 계산 결과
    let isDegree = true;        // 각도 모드 (기본 DEG)
    let memoryValue = 0;        // 메모리 값
    let shouldReset = false;    // 계산 직후 초기화용 플래그

    // DOM 선택자
    const formulaDisplay = document.getElementById("formulaDisplay");
    const resultDisplay = document.getElementById("resultDisplay");
    const degIndicator = document.getElementById("degIndicator");
    const radIndicator = document.getElementById("radIndicator");
    const memoryIndicator = document.getElementById("memoryIndicator");

    updateLCD();

    // LCD 전체 업데이트 함수
    function updateLCD() {
      if (currentInput === "") {
        formulaDisplay.innerHTML = '<span class="opacity-30 text-xs">Enter math formula</span>';
      } else {
        formulaDisplay.textContent = currentInput;
      }

      if (resultValue === "Error") {
        resultDisplay.textContent = "Math ERROR";
      } else {
        resultDisplay.textContent = resultValue;
      }
    }

    // 각도 변경 (DEG <-> RAD)
    function toggleAngleUnit() {
      isDegree = !isDegree;
      if (isDegree) {
        degIndicator.className = "text-slate-900 font-extrabold";
        radIndicator.className = "opacity-30";
      } else {
        radIndicator.className = "text-slate-900 font-extrabold";
        degIndicator.className = "opacity-30";
      }
    }

    // 숫자 버튼 클릭
    function appendNumber(num) {
      if (shouldReset) {
        currentInput = "";
        shouldReset = false;
      }
      currentInput += num;
      updateLCD();
    }

    // 소수점 처리
    function appendDecimal() {
      if (shouldReset) {
        currentInput = "0";
        shouldReset = false;
      }
      const tokens = currentInput.split(/[\+\-\*\/]/);
      const lastToken = tokens[tokens.length - 1];
      if (!lastToken.includes('.')) {
        currentInput += ".";
      }
      updateLCD();
    }

    // 연산자 처리
    function appendOperator(op) {
      if (shouldReset) {
        currentInput = resultValue;
        shouldReset = false;
      }
      if (currentInput === "") {
        if (op === '-') {
          currentInput += op;
        }
        return;
      }
      const lastChar = currentInput.slice(-1);
      const isOperator = ['+', '-', '*', '/'].includes(lastChar);
      if (isOperator) {
        currentInput = currentInput.slice(0, -1) + op;
      } else {
        currentInput += op;
      }
      updateLCD();
    }

    // 괄호 처리
    function appendBracket(bracket) {
      if (shouldReset) {
        currentInput = "";
        shouldReset = false;
      }
      currentInput += bracket;
      updateLCD();
    }

    // 상수 처리
    function appendConstant(constName) {
      if (shouldReset) {
        currentInput = "";
        shouldReset = false;
      }
      const label = constName === 'Math.PI' ? 'π' : 'e';
      currentInput += label;
      updateLCD();
    }

    // 특수 수학 함수 추가
    function appendFunction(funcName) {
      if (shouldReset) {
        currentInput = "";
        shouldReset = false;
      }
      const lastChar = currentInput.slice(-1);
      if (lastChar !== "" && !isNaN(lastChar)) {
        currentInput += "*";
      }
      if (funcName === 'fact') {
        currentInput += "!";
      } else {
        currentInput += funcName + "(";
      }
      updateLCD();
    }

    // 메모리 저장 및 로드
    function handleMemory(action) {
      const currentVal = parseFloat(resultValue) || 0;
      if (action === 'M+') {
        memoryValue += currentVal;
        memoryIndicator.classList.remove("hidden");
      } else {
        memoryValue = 0;
        memoryIndicator.classList.add("hidden");
      }
      shouldReset = true;
    }

    // 문자 삭제 (DEL)
    function backspace() {
      if (shouldReset) {
        clearAll();
        return;
      }
      if (currentInput.length > 0) {
        currentInput = currentInput.slice(0, -1);
      }
      updateLCD();
    }

    // 완전 초기화 (AC)
    function clearAll() {
      currentInput = "";
      resultValue = "0";
      shouldReset = false;
      updateLCD();
    }

    // 팩토리얼 함수
    function fact(n) {
      if (n < 0 || !Number.isInteger(n)) return NaN;
      if (n === 0 || n === 1) return 1;
      let res = 1;
      for (let i = 2; i <= n; i++) res *= i;
      return res;
    }

    // 카시오 수식을 자바스크립트용 수식으로 가공
    function buildEvaluatableFormula(expression) {
      let formula = expression;
      formula = formula.replace(/π/g, "Math.PI");
      formula = formula.replace(/e/g, "Math.E");
      const angleUnit = isDegree ? "(Math.PI / 180)" : "1";
      formula = formula.replace(/sin\(/g, `Math.sin(${angleUnit}*`);
      formula = formula.replace(/cos\(/g, `Math.cos(${angleUnit}*`);
      formula = formula.replace(/tan\(/g, `Math.tan(${angleUnit}*`);
      formula = formula.replace(/log10\(/g, "Math.log10(");
      formula = formula.replace(/ln\(/g, "Math.log(");
      formula = formula.replace(/sqrt\(/g, "Math.sqrt(");
      formula = formula.replace(/exp\(/g, "Math.exp(");
      formula = formula.replace(/(\d+)!/g, "fact($1)");
      return formula;
    }

    // 계산 (=)
    function calculate() {
      if (currentInput === "") return;
      let formula = currentInput;
      const openCount = (formula.match(/\(/g) || []).length;
      const closeCount = (formula.match(/\)/g) || []).length;
      if (openCount > closeCount) {
        formula += ")".repeat(openCount - closeCount);
      }
      try {
        const parsedFormula = buildEvaluatableFormula(formula);
        const calcResult = new Function(`return (${parsedFormula})`)();
        if (calcResult === undefined || isNaN(calcResult)) {
          throw new Error();
        }
        resultValue = Number.isInteger(calcResult) 
          ? calcResult.toString() 
          : parseFloat(calcResult.toFixed(10)).toString();
      } catch (e) {
        resultValue = "Error";
      }
      shouldReset = true;
      updateLCD();
    }

    // 키보드 입력 대응
    document.addEventListener("keydown", function(event) {
      const key = event.key;
      if (key >= "0" && key <= "9") {
        appendNumber(key);
      } else if (key === ".") {
        appendDecimal();
      } else if (key === "+") {
        appendOperator("+");
      } else if (key === "-") {
        appendOperator("-");
      } else if (key === "*") {
        appendOperator("*");
      } else if (key === "/") {
        event.preventDefault();
        appendOperator("/");
      } else if (key === "(") {
        appendBracket("(");
      } else if (key === ")") {
        appendBracket(")");
      } else if (key === "Enter" || key === "=") {
        calculate();
      } else if (key === "Backspace") {
        backspace();
      } else if (key === "Escape") {
        clearAll();
      }
    });
  </script>
</body>
</html>
